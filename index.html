   🎓  CEREBRO DEL MAESTRO (basado en métodos con respaldo científico)
   ════════════════════════════════════════════════════════════════ */
const SP = `Eres LinguaMaestro, un profesor de inglés de élite potenciado por IA, experto en enseñar a hispanohablantes que han tenido dificultades. Tu método es REAL y está basado en evidencia científica de adquisición de segundas lenguas. NO eres genérico ni superficial: diseñas un método funcional y comprobado.

FUNDAMENTOS CIENTÍFICOS QUE APLICAS SIEMPRE:
- Input comprensible (Krashen): contenido un paso por encima del nivel actual (i+1).
- Repetición espaciada (curva del olvido de Ebbinghaus): reintroduce vocabulario y estructuras en intervalos crecientes.
- Práctica de recuperación (retrieval practice): haz que el estudiante recuerde activamente, no que solo reconozca.
- Output forzado (Swain): obliga con cariño a producir lengua (hablar/escribir), no solo recibir.
- Vocabulario de alta frecuencia primero (Paul Nation): las primeras ~1000 palabras cubren ~80% del idioma cotidiano; prioriza eso.
- Enseñanza comunicativa (CLT) y por tareas (TBLT): significado antes que forma; tareas del mundo real.
- Foco en la forma dentro de la comunicación: la gramática se enseña en contexto, moviéndose de input a output.
- Interacción con retroalimentación correctiva: corrige los errores con tacto, en el momento, y haz que se autocorrija.
- Combinas varios métodos (ningún método único basta).

LAS 4 DESTREZAS — cada clase debe trabajar y rotar entre:
1. 📖 LECTURA COMPRENSIVA: textos cortos adaptados al nivel + preguntas.
2. 🎧 LISTENING: marca frases para escuchar; dile al estudiante "toca el botón 🔊 para escuchar". Pídele que repita lo que oyó.
3. 🗣️ PRONUNCIACIÓN y SPEAKING: pide que diga frases en voz alta (puede usar la sección de Pronunciación con micrófono). Da tips fonéticos concretos.
4. ✍️ PRODUCCIÓN ESCRITA: que escriba sus propias oraciones.
La meta del curso: que el estudiante TERMINE comprendiendo, leyendo, escuchando y HABLANDO inglés.

INGLÉS REAL Y NATIVO (¡muy importante!):
No te quedes solo en lo formal/académico. Enseña también cómo hablan los nativos de verdad: expresiones cotidianas, phrasal verbs comunes, slang apropiado, contracciones (gonna, wanna), muletillas naturales. Explica cuándo es formal y cuándo informal.

PERSONALIZACIÓN Y MOTIVACIÓN:
- ADAPTA TODO a la cotidianidad del estudiante: su rutina, su trabajo, lo que hace cada día. Pregunta por su día a día y usa ESAS situaciones en los ejemplos y ejercicios.
- Ancla el vocabulario y los ejemplos a SUS INTERESES y gustos (lo que ama) para maximizar la motivación.
- DINÁMICA DE NIVELES Y COMPETITIVIDAD: trata el avance como un juego. Celebra cuando "sube de nivel", lánzale retos ("¿te atreves con este desafío?"), reconoce rachas y logros con energía. Usa lenguaje de videojuego/logros con naturalidad.

════════ FASES ════════
🔵 onboarding — Conversación amigable (NO cuestionario). Descubre poco a poco: nombre, por qué quiere inglés ahora (meta emocional), trabajo/hobbies/INTERESES, su RUTINA DIARIA, su personalidad de aprendizaje, qué intentó antes y falló, su bloqueo emocional. CRUCIAL: cuánto tiempo REAL puede dedicar al día y a qué nivel quiere llegar y en cuánto tiempo. Si la meta no es realista para ese tiempo, valida su entusiasmo, explícale con honestidad qué es alcanzable, y propón el plan MÁS CERCANO posible a su sueño pero real (ofrécele opciones; él decide). Máx 2 preguntas por mensaje. Con suficiente contexto (5-7 intercambios) → fase=placement.

🔴 placement — Prueba de nivelación tipo "exploración". En 4-5 mensajes: vocabulario, gramática, comprensión lectora (texto+preguntas), y producción escrita. Determina nivel con matiz: Principiante Absoluto / Principiante / Elemental / Pre-Intermedio / Intermedio / Intermedio-Alto. → fase=curriculum.

🟢 curriculum — Presenta con entusiasmo: nivel exacto + fortalezas; oportunidades de mejora; la METODOLOGÍA elegida para ESTA persona y POR QUÉ (cítale los principios reales: input comprensible, repetición espaciada, alta frecuencia, las 4 destrezas, inglés nativo), conectada a su rutina, intereses y tiempo; mapa de ruta con niveles/etapas y metas realistas; cómo serán las clases. Al confirmar → fase=learning, leccion=1.

🟡 learning — CLASES DIARIAS. Estructura flexible: 1) Warm-up con repaso espaciado gamificado. 2) Contenido nuevo (máx 5-7 elementos) anclado a sus intereses y rutina. 3) Trabaja al menos una de las 4 destrezas a fondo (rota entre clases: lectura, listening con 🔊, pronunciación, escritura). 4) Incluye de vez en cuando una pizca de inglés nativo/cotidiano. 5) Ejercicios variados (mín 2 tipos). 6) Misión del mundo real conectada a su día. 7) Cierre con logro tipo nivel + adelanto + frase motivadora. Cuando diga "siguiente/continúa" → siguiente lección de inmediato. Sube el número de lección por clase. Cada 10 lecciones → fase=assessment.

🟠 assessment — Evaluación (cada 10 lecciones): prueba de las 4 destrezas (10-12 ítems). Análisis de progreso, logros celebrados, refuerzos. → fase=learning.

════════ FORMATO ════════
150-420 palabras. Varía SIEMPRE la estructura. Creativo: historias, personajes, retos, humor.
📝 EJERCICIO: | 🎯 MISIÓN: | 📊 EVALUACIÓN: | 📌 GRAMÁTICA: | 📖 LECTURA: | 🎧 LISTENING: | 🗣️ PRONUNCIACIÓN: | 💬 INGLÉS REAL: | 🏆 LOGRO: | 💡 TIP:
**negrita** palabras en inglés y conceptos clave | *cursiva* traducciones | listas con •
Para listening, escribe la frase en inglés y dile que toque 🔊 para oírla.
IDIOMA PROGRESIVO: Principiante Absoluto 95% español · Principiante 85% · Elemental 70% · Pre-Intermedio 50% · Intermedio 25% · Intermedio-Alto casi todo inglés.

/* ════════ Utilidades ════════ */
function parseMeta(txt){const m=txt.match(/\n?\[META:\s*([^\]]+)\]/);if(!m)return{clean:txt,meta:null};const meta={};m[1].split(",").forEach(p=>{const i=p.indexOf("=");if(i>-1){const k=p.slice(0,i).trim(),v=p.slice(i+1).trim();meta[k]=v==="null"?null:v;}});return{clean:txt.replace(/\n?\[META:[^\]]+\]/g,"").trim(),meta};}
function fmt(t){if(!t)return"";return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\*\*([^*\n]+)\*\*/g,'<strong style="color:#FBBF24;font-weight:600">$1</strong>').replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g,'<em style="color:#C4B5FD">$1</em>').replace(/`([^`\n]+)`/g,'<code style="background:rgba(139,92,246,.18);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:.87em;color:#DDD6FE">$1</code>');}
function jsonExtract(text){let t=text.replace(/```json/gi,"").replace(/```/g,"").trim();const a=t.indexOf("["),b=t.lastIndexOf("]");if(a>-1&&b>-1)t=t.slice(a,b+1);return JSON.parse(t);}
function norm(s){return (s||"").toLowerCase().replace(/[^a-z0-9áéíóúñ\s]/gi,"").replace(/\s+/g," ").trim();}
function simWords(target,said){const t=norm(target),s=new Set(norm(said).split(" "));if(!t)return 0;const tw=t.split(" ");const hit=tw.filter(w=>s.has(w)).length;return Math.round(100*hit/tw.length);}

/* Voz del navegador (listening) — gratis, sin API */
function speak(text,rate=0.95){try{window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=rate;const vs=window.speechSynthesis.getVoices();const v=vs.find(x=>x.lang&&x.lang.toLowerCase().startsWith("en"));if(v)u.voice=v;window.speechSynthesis.speak(u);}catch(e){}}
try{window.speechSynthesis&&window.speechSynthesis.getVoices();}catch(e){}
function SpeakBtn({text,size=15}){return <button onClick={()=>speak(text)} title="Escuchar" style={{background:"rgba(14,165,233,.12)",border:"1px solid rgba(14,165,233,.3)",borderRadius:6,padding:"2px 7px",color:"#7DD3FC",fontSize:size}}>🔊</button>;}

/* Reconocimiento de voz (pronunciación) */
function recognizeOnce(){return new Promise((res,rej)=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){rej("unsupported");return;}const r=new SR();r.lang="en-US";r.interimResults=false;r.maxAlternatives=3;let done=false;r.onresult=e=>{done=true;res([...e.results[0]].map(a=>a.transcript));};r.onerror=e=>rej(e.error||"error");r.onend=()=>{if(!done)rej("nospeech");};try{r.start();}catch(e){rej("error");}});}

/* Llamada al profesor / generadores */
async function callChat(messages, system){
  const res = await fetch("/.netlify/functions/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system,messages})});
  if(res.status===503) return {noApi:true};
  const data = await res.json();
  if(!res.ok) throw new Error(data.error?.message||"API error");
  return {text:(data.content||[]).map(b=>b.text||"").join("")};
}
async function genJSON(system,userPrompt){
  const r = await callChat([{role:"user",content:userPrompt}], system);
  if(r.noApi) return {noApi:true};
  return {data: jsonExtract(r.text)};
}

      <div style={{fontSize:"0.74rem",color:"#5B7099",marginBottom:18}}>¿Cómo se dice en inglés?</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,maxWidth:420,margin:"0 auto"}}>
        {round.opts.map((o,i)=>{const isCorrect=feedback&&o.en===round.correct.en;const isWrong=feedback&&feedback===o.en;return <button key={i} onClick={()=>pick(o)} style={{padding:"14px",borderRadius:11,fontSize:"0.95rem",fontWeight:600,border:`1px solid ${isCorrect?"rgba(16,185,129,.5)":isWrong?"rgba(239,68,68,.5)":"rgba(139,92,246,.2)"}`,background:isCorrect?"rgba(16,185,129,.14)":isWrong?"rgba(239,68,68,.1)":"rgba(139,92,246,.07)",color:"#E2E8F0"}}>{o.en} {isCorrect?"✓":isWrong?"✗":""}</button>;})}

    </div>}
  </div>;
}

/* ════════ SECCIÓN: CULTURA E INGLÉS NATIVO ════════ */

        </div>
      ))}
    </div>}
  </div>;
}

/* ════════ XP / NIVEL ════════ */
function levelFromXP(xp){return Math.floor(xp/100)+1;}
function xpInLevel(xp){return xp%100;}

const TABS=[{k:"prof",i:"🎓",l:"Profesor"},{k:"vocab",i:"📔",l:"Vocabulario"},{k:"ejer",i:"⚡",l:"Ejercicios"},{k:"pron",i:"🗣️",l:"Pronunciación"},{k:"juegos",i:"🎮",l:"Juegos"},{k:"cultura",i:"🌍",l:"Cultura"}];
function StudentApp({session, onLogout, backToAdmin}){
  const uid=session.user.id;
  const [boot,setBoot]=useState(true),[tab,setTab]=useState("prof"),[xpFlash,setXpFlash]=useState(null),[editInt,setEditInt]=useState(false),[intDraft,setIntDraft]=useState("");
  const stRef=useRef({msgs:[],prof:{...FRESH},interests:"",xp:0,streak:0,lastDay:null,mastered:[]});
  const [,force]=useState(0); const rerender=()=>force(x=>x+1);

  useEffect(()=>{init();},[]);
  async function init(){
    try{const{data}=await sb.from("student_state").select("data").eq("user_id",uid).maybeSingle();if(data?.data){const d=data.data;stRef.current={msgs:d.msgs||[],prof:{...FRESH,...(d.prof||{})},interests:d.interests||"",xp:d.xp||0,streak:d.streak||0,lastDay:d.lastDay||null,mastered:d.mastered||[]};}}catch(e){console.error(e);}

    setIntDraft(stRef.current.interests);
    setBoot(false);
  }
  async function persist(){try{const s=stRef.current;await sb.from("student_state").upsert({user_id:uid,data:{msgs:s.msgs.slice(-60),prof:s.prof,interests:s.interests,xp:s.xp,streak:s.streak,lastDay:s.lastDay,mastered:s.mastered},updated_at:new Date().toISOString()});}catch(e){console.error(e);}}
  function save(patch){Object.assign(stRef.current,patch);rerender();persist();}
  function addXP(n){const before=levelFromXP(stRef.current.xp);stRef.current.xp+=n;const after=levelFromXP(stRef.current.xp);setXpFlash("+"+n+" XP");setTimeout(()=>setXpFlash(null),1400);if(after>before){setTimeout(()=>{setXpFlash("🎉 ¡Nivel "+after+"!");setTimeout(()=>setXpFlash(null),1800);},300);}rerender();persist();}

  const s=stRef.current,lvl=levelFromXP(s.xp),ph=PH[s.prof.phase]||PH.onboarding;
  const props={st:s,save,addXP};

        <div><div style={{fontWeight:700,fontSize:"0.95rem"}}>LinguaMaestro</div><div style={{fontSize:"0.6rem",color:"#3D5070"}}>Aprende inglés de verdad</div></div>

        {s.prof.level!=="Por determinar"&&<span style={{background:"rgba(139,92,246,.12)",border:"1px solid rgba(139,92,246,.25)",color:"#A78BFA",borderRadius:16,padding:"3px 10px",fontSize:"0.66rem",fontWeight:600}}>{s.prof.level}</span>}
        {backToAdmin&&<button onClick={backToAdmin} style={{background:"rgba(59,130,246,.12)",border:"1px solid rgba(59,130,246,.3)",color:"#93C5FD",borderRadius:6,padding:"4px 10px",fontSize:"0.68rem"}}>← Panel</button>}

      </div>

/* ════════ PANEL DE ADMIN ════════ */
function Admin({session, onLogout, onTeach}){

        </table></div></div>
      )}
      <div style={{textAlign:"center",marginTop:24,fontSize:"0.66rem",color:"#2A3A50"}}>La Etapa 2 (suscripciones) se añadirá sobre esta misma base.</div>
    </div></div>
  </div>;
}

/* ════════ RAÍZ ════════ */
function Root(){
  const [session,setSession]=useState(null),[ready,setReady]=useState(false),[role,setRole]=useState(null),[asStudent,setAsStudent]=useState(false);
  useEffect(()=>{if(!CONFIGURED){setReady(true);return;}sb.auth.getSession().then(({data})=>{setSession(data.session);setReady(true);});const{data:sub}=sb.auth.onAuthStateChange((_e,s)=>{setSession(s);if(!s){setRole(null);setAsStudent(false);}});return()=>sub.subscription.unsubscribe();},[]);
  useEffect(()=>{if(!session){setRole(null);return;}(async()=>{try{const{data}=await sb.from("profiles").select("role").eq("id",session.user.id).maybeSingle();setRole(data?.role||"student");}catch{setRole("student");}})();},[session]);
  if(!CONFIGURED)return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060D1F",padding:24,fontFamily:"system-ui,sans-serif"}}><div style={{maxWidth:440,background:"#0A1226",border:"1px solid rgba(245,158,11,.3)",borderRadius:16,padding:28,color:"#E2E8F0"}}><div style={{fontSize:38,marginBottom:12,textAlign:"center"}}>⚙️</div><div style={{fontSize:"1.1rem",fontWeight:700,marginBottom:12,color:"#FCD34D",textAlign:"center"}}>Falta conectar Supabase</div><div style={{fontSize:"0.85rem",color:"#94A3B8",lineHeight:1.7}}>Abre <code style={{background:"rgba(139,92,246,.18)",padding:"1px 6px",borderRadius:4,color:"#DDD6FE"}}>index.html</code> y pega tu Project URL y anon key en la sección CONFIGURACIÓN.</div></div></div>;
  if(!ready||(session&&role===null))return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060D1F"}}><div style={{fontSize:46,animation:"lmS 2.5s linear infinite"}}>🌐</div></div>;
  if(!session)return <Auth onAuth={setSession}/>;
  const logout=async()=>{await sb.auth.signOut();setSession(null);setRole(null);setAsStudent(false);};
  if(role==="admin"&&!asStudent)return <Admin session={session} onLogout={logout} onTeach={()=>setAsStudent(true)}/>;
  return <StudentApp key={asStudent?"stu":"main"} session={session} onLogout={logout} backToAdmin={role==="admin"?()=>setAsStudent(false):null}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
